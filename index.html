<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eid Countdown</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
background-color: black;
      overflow:hidden;
    }

    .container{
      width:90%;
      max-width:900px;
      padding:40px;
      border-radius:25px;
      background:rgba(255,255,255,0.1);
      backdrop-filter:blur(10px);
      text-align:center;
      box-shadow:0 0 25px rgba(0,0,0,0.4);
    }

    h1{
      color:white;
      font-size:55px;
      margin-bottom:40px;
    }

    .countdown{
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
    }

    .box{
      width:170px;
      height:170px;
      background:white;
      border-radius:20px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      box-shadow:0 0 20px rgba(0,0,0,0.3);
      transition:0.4s;
    }

    .box:hover{
      transform:translateY(-10px) scale(1.05);
    }

    .number{
      font-size:55px;
      font-weight:bold;
      color:#dd2476;
    }

    .text{
      margin-top:10px;
      font-size:22px;
      font-weight:bold;
      color:#333;
    }

    @media(max-width:700px){

      h1{
        font-size:38px;
      }

      .box{
        width:130px;
        height:130px;
      }

      .number{
        font-size:40px;
      }

      .text{
        font-size:18px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <h1>Eid ul Azha Countdown</h1>

    <div class="countdown">

      <div class="box">
        <div class="number" id="days">0</div>
        <div class="text">Days</div>
      </div>

      <div class="box">
        <div class="number" id="hours">0</div>
        <div class="text">Hours</div>
      </div>

      <div class="box">
        <div class="number" id="minutes">0</div>
        <div class="text">Minutes</div>
      </div>

      <div class="box">
        <div class="number" id="seconds">0</div>
        <div class="text">Seconds</div>
      </div>

    </div>

  </div>

<script>

  // Eid Date
  var eidDate = new Date("May 28, 2026 00:00:00").getTime();

  function updateCountdown(){

    var now = new Date().getTime();

    var gap = eidDate - now;

    var second = 1000;
    var minute = second * 60;
    var hour = minute * 60;
    var day = hour * 24;

    var days = Math.floor(gap / day);
    var hours = Math.floor((gap % day) / hour);
    var minutes = Math.floor((gap % hour) / minute);
    var seconds = Math.floor((gap % minute) / second);

    document.getElementById("days").innerHTML = days;
    document.getElementById("hours").innerHTML = hours;
    document.getElementById("minutes").innerHTML = minutes;
    document.getElementById("seconds").innerHTML = seconds;

    if(gap < 0){
      document.querySelector(".countdown").innerHTML =
      "<h1 style='color:white;'>🎉 Eid Mubarak 🎉</h1>";
    }

  }

  updateCountdown();

  setInterval(updateCountdown,1000);

</script>

</body>
</html>
